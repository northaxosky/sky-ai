# Throughput benchmark for sizing the proxy on a single 4090.
# Run:  uv run skyai train --config configs/gpt2-bench.yaml
# Then read the steady-state "tok/s=" from the logs (ignore the first ~3 compile-warmup
# steps), and plug it into the max_steps formula in gpt2-adamw-proxy.yaml.
#
# If step 0 OOMs, lower data.batch_size (8, then 4); tok/s is ~batch-size-independent.
extends: gpt2.yaml

data:
  batch_size: 16          # grad_accum auto-fills to 0.5M tokens/step, same as the proxy

schedule:
  warmup_steps: 2
  max_steps: 20           # ~10M tokens — a couple minutes incl. torch.compile warmup

eval:
  interval: 1000000       # no eval during the benchmark
  val_steps: 1
  evals: []

log:
  wandb: false
  dir: logs/bench

checkpoint:
  dir: checkpoints/bench
  every_n_steps: 1000000
