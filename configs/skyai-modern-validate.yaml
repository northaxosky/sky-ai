# Local validation config for the intended modern recipe candidate.
# Uses cl100k shards, GQA, SkyAI init, Muon split optimizer, and WSD schedule.

extends: skyai-124m-validate.yaml

grad_clip: null  # nanochat pretraining does not clip gradients

model:
  tokenizer: cl100k_base
  vocab_size: 100352       # cl100k_base n_vocab=100277 padded to 128
  n_kv_head: 3             # 12 query heads, 4:1 GQA
  init_policy: sky-ai

data:
  root: data/fineweb_cl100k

optim:
  type: muon-split
  weight_decay: 0.28       # Muon weight decay base, scheduled by training loop
  embedding_lr: 0.3
  unembedding_lr: 0.008
  matrix_lr: 0.02
  muon_momentum: 0.95
  muon_beta2: 0.9
  muon_ns_steps: 5

schedule:
  type: warmup-stable-decay
  warmup_steps: 40
  warmdown_ratio: 0.65
  final_lr_frac: 0.05

log:
  dir: logs/skyai-modern-validate

checkpoint:
  dir: checkpoints/skyai-modern-validate
