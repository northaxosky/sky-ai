# skyai-xl (~1.5B) — the scale-up of skyai. Only dimensions, data, and budget change.
# Data is expected to be tokenized from ClimbMix with scripts/shard_text.py.
extends: skyai.yaml

model:
  n_layer: 48
  n_head: 32
  n_kv_head: 8
  n_embed: 1536
  block_size: 2048

data:
  root: data/climbmix_cl100k
  batch_size: 16

schedule:
  max_steps: 57220

eval:
  interval: 1000
  evals: [hellaswag, lambada]
  sample_prompt: "Hello, I'm a language model,"
  sample_n: 4
  sample_max_length: 64

log:
  dir: logs/skyai-xl

checkpoint:
  dir: checkpoints/skyai-xl
  best_metric: val_loss
  best_direction: min
