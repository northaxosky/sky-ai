# Tiny config for smoke testing the harness end-to-end.
# Inherits everything from base.yaml, overrides for fast local CPU/single-GPU runs.

extends: gpt2.yaml

seed: 0
compile: false
total_batch_size: 256  # 4 * 64 * 1 rank, grad_accum = 1

model:
  n_layer: 2
  n_head: 2
  n_embd: 128
  block_size: 64

data:
  batch_size: 4

schedule:
  max_lr: 1.0e-3
  min_lr: 1.0e-4
  warmup_steps: 5
  max_steps: 50

eval:
  interval: 10
  val_steps: 4
  evals: []

log:
  wandb: false

checkpoint:
  every_n_steps: 25
